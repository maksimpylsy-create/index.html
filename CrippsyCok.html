<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CrippsyCok — Restaurant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('ChickenSucker1.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            text-align: center;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.45);
            width: 100%;
            height: 100vh;
            padding-top: 80px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px black;
        }

        p {
            font-size: 20px;
            margin-bottom: 40px;
            text-shadow: 0 0 8px black;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;

            background-color: #3cb371;
            color: white;

            padding: 14px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;

            text-decoration: none;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .back-btn:hover {
            background-color: #2e8b57;
            transform: scale(1.03);
        }

        .menu-box {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 25px;
            width: 60%;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .menu-item {
            font-size: 22px;
            margin: 12px 0;
            padding: 10px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <a href="video-room.html" class="back-btn">Back to Video Room</a>

    <div class="overlay">
        <h1>Welcome to CrippsyCok Restaurant</h1>
        <p>Embrace the Chicken!</p>

        <div class="menu-box">
            <div class="menu-item">🐔 Rooster's Balls 100 euro</div>
            <div class="menu-item">🐔 Cok item not added yet</div>
            <div class="menu-item">🐔 Cok item not added yet</div>
            <div class="menu-item">🐔 Cok item not added yet</div>
            <div class="menu-item">🐔 Cok item not added yet</div>
        </div>
    </div>

</body>
</html>
