<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Room — Poiskeloy</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;

            background-image: url('TropicalPic1.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            display: flex;
            gap: 40px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .comments {
            width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .comments h2 {
            margin-top: 0;
            font-size: 20px;
        }

        .comment-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .comment-box button {
            width: 100%;
            padding: 8px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .comment {
            background-color: #f1f1f1;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        video {
            width: 50%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- COMMENT SECTION -->
        <div class="comments">
            <h2>Comments</h2>

            <div class="comment-box">
                <input type="text" id="username" placeholder="Your name">
                <input type="text" id="commentText" placeholder="Your comment">
                <button onclick="addComment()">Post Comment</button>
            </div>

            <div id="commentList"></div>
        </div>

        <!-- VIDEO -->
        <video controls autoplay>
            <source src="hussein.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // TODO: Replace with YOUR Firebase config from the Firebase console
        // Project settings -> Your apps -> Web app -> Config
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Reference to comments collection in Realtime Database
        var commentsRef = firebase.database().ref("poiskeloy-comments");

        // Render a single comment
        function renderComment(data) {
            var comment = data.val();
            var commentList = document.getElementById('commentList');

            var div = document.createElement('div');
            div.className = 'comment';
            div.innerHTML = "<strong>" + escapeHtml(comment.name) + "</strong><br>" +
                            escapeHtml(comment.text);

            commentList.appendChild(div);
        }

        // Escape HTML to avoid XSS
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Load existing comments and listen for new ones
        commentsRef.on("child_added", function(snapshot) {
            renderComment(snapshot);
        });

        // Add a new comment
        function addComment() {
            var nameInput = document.getElementById('username');
            var textInput = document.getElementById('commentText');

            var name = nameInput.value.trim();
            var text = textInput.value.trim();

            if (!name || !text) return;

            // Push comment to Firebase (everyone will see it)
            commentsRef.push({
                name: name,
                text: text,
                timestamp: Date.now()
            });

            // Clear inputs
            nameInput.value = '';
            textInput.value = '';
        }
    </script>

</body>
</html>
