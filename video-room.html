<script>
try {

const firebaseConfig = {
    apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
    authDomain: "poiskeloy.firebaseapp.com",
    databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com",
    projectId: "poiskeloy",
    storageBucket: "poiskeloy.appspot.com",
    messagingSenderId: "7232327876242",
    appId: "1:7232327876242:web:c619f1e32adf740d16f4b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const commentsRef = db.ref("comments");
const repliesRef = db.ref("replies");

let isAdmin = false;

function enableAdmin() {
    if (document.getElementById('adminCode').value === "Goon67") {
        isAdmin = true;
        alert("Admin enabled");
    }
}

function addComment() {
    const name = username.value.trim();
    const text = commentText.value.trim();
    if (!name || !text) return;

    commentsRef.push({ name, text, timestamp: Date.now() });

    username.value = "";
    commentText.value = "";
}

function renderComment(key, data) {
    const list = document.getElementById('commentList');

    const div = document.createElement('div');
    div.className = "comment";

    div.innerHTML = `
        <strong>${data.name}</strong>
        <div>${data.text}</div>
        <div>${new Date(data.timestamp).toLocaleString()}</div>

        <div style="font-size:12px;color:blue;cursor:pointer" onclick="showReply('${key}')">Reply</div>

        <div id="reply-${key}"></div>
        <div id="replies-${key}"></div>
    `;

    list.appendChild(div);

    loadReplies(key);
}

function showReply(id) {
    document.getElementById("reply-"+id).innerHTML = `
        <input id="rn-${id}" placeholder="name">
        <input id="rt-${id}" placeholder="reply">
        <button onclick="addReply('${id}')">send</button>
    `;
}

function addReply(id) {
    const name = document.getElementById(`rn-${id}`).value;
    const text = document.getElementById(`rt-${id}`).value;

    repliesRef.child(id).push({
        name, text, timestamp: Date.now()
    });
}

function loadReplies(id) {
    repliesRef.child(id).on("value", snap => {
        const box = document.getElementById("replies-"+id);
        box.innerHTML = "";

        let count = 0;

        snap.forEach(s => {
            count++;

            const d = s.val();

            const el = document.createElement("div");
            el.innerHTML = `<b>${d.name}</b>: ${d.text}`;

            if (count > 2) el.style.display = "none";

            box.appendChild(el);
        });
    });
}

commentsRef.on("child_added", s => renderComment(s.key, s.val()));

} catch (e) {
    document.body.innerHTML = "<h1 style='color:red'>ERROR: " + e.message + "</h1>";
}
</script>
