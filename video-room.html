<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Room — Poiskeloy</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background-image: url('TropicalPic1.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .container {
      display: flex;
      gap: 40px;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      align-items: flex-start;
    }

    .comments {
      width: 300px;
      max-height: 80vh;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.85);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .comment-box input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .comment-box button {
      width: 100%;
      padding: 8px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .comment {
      background-color: #f1f1f1;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    video {
      width: 300px;
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="comments">
      <h2>Comments</h2>
      <div class="comment-box">
        <input type="text" id="username" placeholder="Your name">
        <input type="text" id="commentText" placeholder="Your comment">
        <button onclick="addComment()">Post Comment</button>
      </div>
      <div id="commentList"></div>
    </div>

    <video controls autoplay>
      <source src="hussein.mp4.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAyX_ZtqO1T79hgjDrQYwgpusgGBGuSKnA",
      authDomain: "poiskeloy.firebaseapp.com",
      projectId: "poiskeloy",
      storageBucket: "poiskeloy.firebasestorage.app",
      messagingSenderId: "723227876242",
      appId: "1:723227876242:web:c619f1e32adf740d16ff4b",
      measurementId: "G-55SQRM4V80",
      databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);
    const commentsRef = ref(db, "poiskeloy-comments");

    window.addComment = function () {
      const name = document.getElementById("username").value.trim();
      const text = document.getElementById("commentText").value.trim();
      if (!name || !text) return;

      push(commentsRef, {
        name: name,
        text: text,
        time: Date.now()
      });

      document.getElementById("username").value = "";
      document.getElementById("commentText").value = "";
    };

    onChildAdded(commentsRef, (snapshot) => {
      const data = snapshot.val();
      const div = document.createElement("div");
      div.className = "comment";
      div.innerHTML = `<strong>${data.name}</strong><br>${data.text}`;
      document.getElementById("commentList").appendChild(div);
    });
  </script>

</body>
</html>
