<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Room</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-image: url('TropicalPic1.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* RESTAURANT BUTTON */
.restaurant-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #3cb371;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}
.restaurant-btn:hover {
    background: #2e8b57;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 40px;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
}

/* COMMENTS */
.comments {
    width: 320px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.9);
    padding: 15px;
    border-radius: 12px;
}

.comment {
    background: #f1f1f1;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
}

.reply {
    background: #ddd;
    margin-top: 5px;
    padding: 5px;
    border-radius: 5px;
}

.reply-btn {
    font-size: 12px;
    color: blue;
    cursor: pointer;
}

.toggle {
    font-size: 12px;
    color: #555;
    cursor: pointer;
}

.delete-btn {
    font-size: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

/* VIDEO */
video {
    width: 500px;
    max-width: 50vw;
    border-radius: 12px;
}
</style>
</head>

<body>

<a href="CrippsyCok.html" class="restaurant-btn">Take me to the Restaurant</a>

<div class="container">

<div class="comments">
<h2>Comments</h2>

<input id="adminCode" placeholder="Admin code">
<button onclick="enableAdmin()">Enter</button>

<br><br>

<input id="username" placeholder="Name">
<input id="commentText" placeholder="Comment">
<button onclick="addComment()">Post</button>

<div id="commentList"></div>
</div>

<video controls autoplay loop>
    <source src="WhiteDogLickingScreen.mp4" type="video/mp4">
</video>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
    databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const commentsRef = db.ref("comments");
const repliesRef = db.ref("replies");

let isAdmin = false;

function enableAdmin() {
    if (adminCode.value === "Goon67") {
        isAdmin = true;
        alert("Admin enabled");
    }
}

function addComment() {
    const name = username.value.trim();
    const text = commentText.value.trim();
    if (!name || !text) return;

    commentsRef.push({
        name,
        text,
        timestamp: Date.now()
    });

    username.value = "";
    commentText.value = "";
}

function renderComment(key, data) {
    const list = document.getElementById("commentList");

    const div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
        <strong>${data.name}</strong>
        <div>${data.text}</div>
        <div style="font-size:11px">${new Date(data.timestamp).toLocaleString()}</div>

        <div class="reply-btn" onclick="showReply('${key}')">Reply</div>

        <div id="replyBox-${key}"></div>
        <div id="replies-${key}"></div>

        <div id="toggle-${key}" class="toggle"></div>

        <button class="delete-btn" onclick="deleteComment('${key}')">Delete</button>
    `;

    list.prepend(div);
    loadReplies(key);
}

function showReply(id) {
    const box = document.getElementById("replyBox-" + id);
    box.innerHTML = `
        <input id="rn-${id}" placeholder="Name">
        <input id="rt-${id}" placeholder="Reply">
        <button onclick="addReply('${id}')">Send</button>
    `;
}

function addReply(id) {
    const name = document.getElementById("rn-" + id).value.trim();
    const text = document.getElementById("rt-" + id).value.trim();

    if (!name || !text) return;

    repliesRef.child(id).push({
        name,
        text,
        timestamp: Date.now()
    });

    document.getElementById("replyBox-" + id).innerHTML = "";
}

/* FIXED REPLIES */
function loadReplies(id) {
    const container = document.getElementById("replies-" + id);
    const toggle = document.getElementById("toggle-" + id);

    repliesRef.child(id).on("value", snap => {
        container.innerHTML = "";

        const replies = [];
        snap.forEach(s => replies.push({key:s.key,...s.val()}));

        replies.forEach((r,i) => {
            const el = document.createElement("div");
            el.className = "reply";

            el.innerHTML = `
                <strong>${r.name}</strong>
                <div>${r.text}</div>
                <div style="font-size:10px">${new Date(r.timestamp).toLocaleString()}</div>
                <button class="delete-btn" onclick="deleteReply('${id}','${r.key}')">Delete</button>
            `;

            if (replies.length > 2 && i >= 2) {
                el.style.display = "none";
                el.classList.add("hidden-reply");
            }

            container.appendChild(el);
        });

        if (replies.length > 2) {
            toggle.innerText = "Show replies";
            toggle.onclick = () => toggleReplies(id);
        } else {
            toggle.innerText = "";
        }
    });
}

function toggleReplies(id) {
    const hidden = document.querySelectorAll(`#replies-${id} .hidden-reply`);
    const isHidden = hidden[0].style.display === "none";

    hidden.forEach(el => {
        el.style.display = isHidden ? "block" : "none";
    });

    document.getElementById("toggle-" + id).innerText =
        isHidden ? "Hide replies" : "Show replies";
}

function deleteComment(id) {
    if (!isAdmin) return alert("Admin only");
    commentsRef.child(id).remove();
}

function deleteReply(cid, rid) {
    if (!isAdmin) return alert("Admin only");
    repliesRef.child(cid).child(rid).remove();
}

commentsRef.on("child_added", s => renderComment(s.key, s.val()));
</script>

</body>
</html>
