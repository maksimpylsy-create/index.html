<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Room</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-image: url('TropicalPic1.jpg');
    background-size: cover;
}

/* BUTTON */
.restaurant-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #00c896;
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
}

/* CONTAINER */
.container {
    display: flex;
    gap: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
}

/* COMMENTS */
.comments {
    width: 260px;
    max-height: 70vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.9);
    padding: 12px;
    border-radius: 12px;
    font-size: 13px;
}

.comment {
    background: #ffffff;
    padding: 6px;
    margin-bottom: 8px;
    border-radius: 8px;
}

.reply {
    background: #e6fff7;
    margin-top: 4px;
    padding: 4px;
    border-radius: 6px;
    font-size: 12px;
}

.reply-btn {
    font-size: 11px;
    color: #0077ff;
    cursor: pointer;
}

.toggle {
    font-size: 11px;
    cursor: pointer;
    color: #555;
}

.delete-btn {
    font-size: 10px;
    background: #ff4d4d;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 4px;
}

/* VIDEO */
video {
    width: 350px;
    border-radius: 12px;
}

/* 👁️ GLAZI */
.glaazi {
    position: fixed;
    width: 120px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.3s ease;
    z-index: 999;
}

.glaazi.visible {
    opacity: 0.6;
    transform: scale(1.05);
}
</style>
</head>

<body>

<a href="CrippsyCok.html" class="restaurant-btn">Restaurant</a>

<div class="container">

<div class="comments">
<h3>Comments</h3>

<input id="adminCode" placeholder="Admin code">
<button onclick="enableAdmin()">OK</button>

<br><br>

<input id="username" placeholder="Name">
<input id="commentText" placeholder="Comment">
<button onclick="addComment()">Post</button>

<div id="commentList"></div>
</div>

<!-- VIDEO -->
<video controls autoplay muted loop>
    <source src="WhiteDogLickScreen.mp4" type="video/mp4">
</video>

</div>

<!-- 👁️ EXACT NAME USED -->
<img src="Glaazi.png" id="glaazi" class="glaazi">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
    databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const commentsRef = db.ref("comments");
const repliesRef = db.ref("replies");

let isAdmin = false;

function enableAdmin() {
    if (adminCode.value === "Goon67") {
        isAdmin = true;
        alert("Admin enabled");
    }
}

function addComment() {
    const name = username.value.trim();
    const text = commentText.value.trim();
    if (!name || !text) return;

    commentsRef.push({
        name,
        text,
        timestamp: Date.now()
    });

    username.value = "";
    commentText.value = "";
}

function renderComment(key, data) {
    const div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
        <strong>${data.name}</strong>
        <div>${data.text}</div>

        <div class="reply-btn" onclick="showReply('${key}')">Reply</div>

        <div id="reply-${key}"></div>
        <div id="replies-${key}"></div>

        <div id="toggle-${key}" class="toggle"></div>

        <button class="delete-btn" onclick="deleteComment('${key}')">Delete</button>
    `;

    commentList.prepend(div);
    loadReplies(key);
}

function showReply(id) {
    document.getElementById("reply-"+id).innerHTML = `
        <input id="rn-${id}" placeholder="Name">
        <input id="rt-${id}" placeholder="Reply">
        <button onclick="addReply('${id}')">Send</button>
    `;
}

function addReply(id) {
    const name = document.getElementById("rn-"+id).value.trim();
    const text = document.getElementById("rt-"+id).value.trim();

    if (!name || !text) return;

    repliesRef.child(id).push({
        name,
        text,
        timestamp: Date.now()
    });

    document.getElementById("reply-"+id).innerHTML = "";
}

function loadReplies(id) {
    const container = document.getElementById("replies-"+id);
    const toggle = document.getElementById("toggle-"+id);

    repliesRef.child(id).on("child_added", snap => {
        const r = snap.val();

        const el = document.createElement("div");
        el.className = "reply";

        el.innerHTML = `
            <strong>${r.name}</strong>
            <div>${r.text}</div>
            <button class="delete-btn" onclick="deleteReply('${id}','${snap.key}')">Delete</button>
        `;

        container.appendChild(el);

        const replies = container.querySelectorAll(".reply");

        if (replies.length > 2) {
            replies.forEach((e,i)=>{
                if (i>=2) e.style.display="none";
            });

            toggle.innerText = "Show replies";
            toggle.onclick = () => toggleReplies(id);
        }
    });
}

function toggleReplies(id) {
    const replies = document.querySelectorAll(`#replies-${id} .reply`);
    const hidden = replies[2].style.display === "none";

    replies.forEach((e,i)=>{
        if (i>=2) e.style.display = hidden ? "block" : "none";
    });

    document.getElementById("toggle-"+id).innerText =
        hidden ? "Hide replies" : "Show replies";
}

function deleteComment(id) {
    if (!isAdmin) return alert("Admin only");
    commentsRef.child(id).remove();
}

function deleteReply(cid, rid) {
    if (!isAdmin) return alert("Admin only");
    repliesRef.child(cid).child(rid).remove();
}

commentsRef.on("child_added", s => renderComment(s.key, s.val()));

/* 👁️ GLAZI EFFECT */
const glaazi = document.getElementById("glaazi");
let glaaziVisible = false;

document.addEventListener("click", (e) => {
    glaaziVisible = !glaaziVisible;

    if (glaaziVisible) {
        glaazi.classList.add("visible");
        glaazi.style.left = (e.clientX - 60) + "px";
        glaazi.style.top = (e.clientY - 60) + "px";
    } else {
        glaazi.classList.remove("visible");
    }
});
</script>

</body>
</html>
