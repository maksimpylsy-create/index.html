<body>

    <div class="container">
        <div class="comments">
            <h2>Comments</h2>

            <div class="admin-box">
                <input type="password" id="adminCode" placeholder="Admin code">
                <button onclick="enableAdmin()">Enter</button>
            </div>

            <div class="wipe-box">
                <button onclick="wipeComments()">Wipe All Comments</button>
            </div>

            <div class="comment-box">
                <input type="text" id="username" placeholder="Your name">
                <input type="text" id="commentText" placeholder="Your comment">
                <button onclick="addComment()">Post Comment</button>
            </div>

            <div id="commentList"></div>
        </div>

        <video controls autoplay>
            <source src="hussein.mp4.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
            authDomain: "poiskeloy.firebaseapp.com",
            databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com",
            projectId: "poiskeloy",
            storageBucket: "poiskeloy.appspot.com",
            messagingSenderId: "7232327876242",
            appId: "1:7232327876242:web:c619f1e32adf740d16f4b",
            measurementId: "G-55QRM4W80"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const commentsRef = db.ref("comments");

        let isAdmin = false;

        function enableAdmin() {
            const code = document.getElementById('adminCode').value.trim();
            if (code === "Goon67") {
                isAdmin = true;
                alert("Admin mode enabled");
                updateAdminVisibility();
            } else {
                alert("Incorrect admin code");
            }
        }

        function addComment() {
            const nameInput = document.getElementById('username');
            const textInput = document.getElementById('commentText');
            const name = nameInput.value.trim();
            const text = textInput.value.trim();

            if (!name || !text) return;

            const newComment = {
                name: name,
                text: text,
                timestamp: Date.now()
            };

            commentsRef.push(newComment);

            nameInput.value = "";
            textInput.value = "";
        }

        function renderComment(key, data) {
            const commentList = document.getElementById('commentList');

            let commentDiv = document.getElementById("comment-" + key);
            if (!commentDiv) {
                commentDiv = document.createElement('div');
                commentDiv.id = "comment-" + key;
                commentDiv.className = "comment";
                commentList.appendChild(commentDiv);
            }

            const date = new Date(data.timestamp || Date.now());
            const timeString = date.toLocaleString();

            commentDiv.innerHTML = `
                <strong>${escapeHtml(data.name || "Anonymous")}</strong>
                <span>${escapeHtml(data.text || "")}</span>
                <div class="comment-time">${timeString}</div>
                <button class="delete-btn" onclick="deleteComment('${key}')">Delete</button>
            `;

            if (isAdmin) {
                commentDiv.classList.add("admin-visible");
            } else {
                commentDiv.classList.remove("admin-visible");
            }
        }

        function deleteComment(key) {
            if (!isAdmin) {
                alert("Admin mode required to delete comments.");
                return;
            }
            if (confirm("Delete this comment?")) {
                commentsRef.child(key).remove();
            }
        }

        function wipeComments() {
            if (!isAdmin) {
                alert("Admin mode required to wipe all comments.");
                return;
            }
            if (confirm("Are you sure you want to delete ALL comments?")) {
                commentsRef.remove();
            }
        }

        commentsRef.on("child_added", snapshot => {
            const key = snapshot.key;
            const data = snapshot.val();
            renderComment(key, data);
        });

        commentsRef.on("child_changed", snapshot => {
            const key = snapshot.key;
            const data = snapshot.val();
            renderComment(key, data);
        });

        commentsRef.on("child_removed", snapshot => {
            const key = snapshot.key;
            const el = document.getElementById("comment-" + key);
            if (el) el.remove();
        });

        function updateAdminVisibility() {
            const comments = document.querySelectorAll(".comment");
            comments.forEach(comment => {
                if (isAdmin) {
                    comment.classList.add("admin-visible");
                } else {
                    comment.classList.remove("admin-visible");
                }
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>

</body>
