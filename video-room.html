<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Room</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background-image: url('TropicalPic1.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

.container {
    display: flex;
    gap: 40px;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
}

/* COMMENTS */
.comments {
    width: 320px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.9);
    padding: 15px;
    border-radius: 12px;
}

.comment {
    background: #f1f1f1;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
}

.reply {
    background: #ddd;
    margin-top: 5px;
    padding: 5px;
    border-radius: 5px;
}

.reply-btn {
    font-size: 12px;
    color: blue;
    cursor: pointer;
}

.toggle {
    font-size: 12px;
    color: #555;
    cursor: pointer;
}

.delete-btn {
    font-size: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

/* VIDEO */
video {
    width: 500px;
    max-width: 50vw;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">

<div class="comments">
<h2>Comments</h2>

<input id="adminCode" placeholder="Admin code">
<button onclick="enableAdmin()">Enter</button>

<br><br>

<input id="username" placeholder="Name">
<input id="commentText" placeholder="Comment">
<button onclick="addComment()">Post</button>

<div id="commentList"></div>
</div>

<!-- VIDEO -->
<video controls autoplay loop>
    <source src="WhiteDogLickScreen.mp4" type="video/mp4">
</video>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAyX_ZtqQI1779hgjDrQYwgpusGBGuSkNA",
    databaseURL: "https://poiskeloy-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const commentsRef = db.ref("comments");
const repliesRef = db.ref("replies");

let isAdmin = false;

function enableAdmin() {
    if (adminCode.value === "Goon67") {
        isAdmin = true;
        alert("Admin enabled");
    }
}

// ADD COMMENT
function addComment() {
    const name = username.value.trim();
    const text = commentText.value.trim();
    if (!name || !text) return;

    commentsRef.push({
        name,
        text,
        timestamp: Date.now()
    });

    username.value = "";
    commentText.value = "";
}

// RENDER COMMENT
function renderComment(key, data) {
    const list = document.getElementById("commentList");

    const div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
        <strong>${data.name}</strong>
        <div>${data.text}</div>
        <div style="font-size:11px">${new Date(data.timestamp).toLocaleString()}</div>

        <div class="reply-btn" onclick="showReply('${key}')">Reply</div>

        <div id="replyBox-${key}"></div>
        <div id="replies-${key}"></div>

        <div id="toggle-${key}" class="toggle"></div>

        <button class="delete-btn" onclick="deleteComment('${key}')">Delete</button>
    `;

    list.prepend(div);
    loadReplies(key);
}

// SHOW REPLY
function showReply(id) {
    const box = document.getElementById("replyBox-" + id);
    box.innerHTML = `
        <input id="rn-${id}" placeholder="Name">
        <input id="rt-${id}" placeholder="Reply">
        <button onclick="addReply('${id}')">Send</button>
    `;
}

// ADD REPLY
function addReply(id) {
    const name = document.getElementById("rn-" + id).value.trim();
    const text = document.getElementById("rt-" + id).value.trim();

    if (!name || !text) return;

    repliesRef.child(id).push({
        name,
        text,
        timestamp: Date.now()
    });

    document.getElementById("replyBox-" + id).innerHTML = "";
}

// LOAD REPLIES
function loadReplies(id) {
    repliesRef.child(id).on("value", snap => {
        const container = document.getElementById("replies-" + id);
        const toggle = document.getElementById("toggle-" + id);

        container.innerHTML = "";

        const replies = [];
        snap.forEach(s => replies.push({key:s.key,...s.val()}));

        replies.forEach((r,i) => {
            const el = document.createElement("div");
            el.className = "reply";

            el.innerHTML = `
                <strong>${r.name}</strong>
                <div>${r.text}</div>
                <div style="font-size:10px">${new Date(r.timestamp).toLocaleString()}</div>
                <button class="delete-btn" onclick="deleteReply('${id}','${r.key}')">Delete</button>
            `;

            if (replies.length > 2 && i >= 2) {
                el.style.display = "none";
            }

            container.appendChild(el);
        });

        if (replies.length > 2) {
            toggle.innerText = "Show replies";
            toggle.onclick = () => toggleReplies(id);
        } else {
            toggle.innerText = "";
        }
    });
}

// TOGGLE
function toggleReplies(id) {
    const items = document.querySelectorAll(`#replies-${id} .reply`);
    const hidden = items[2].style.display === "none";

    items.forEach((el,i)=>{
        if (i >= 2) {
            el.style.display = hidden ? "block" : "none";
        }
    });

    document.getElementById("toggle-" + id).innerText =
        hidden ? "Hide replies" : "Show replies";
}

// DELETE COMMENT
function deleteComment(id) {
    if (!isAdmin) return alert("Admin only");
    commentsRef.child(id).remove();
}

// DELETE REPLY
function deleteReply(cid, rid) {
    if (!isAdmin) return alert("Admin only");
    repliesRef.child(cid).child(rid).remove();
}

// LISTENER
commentsRef.on("child_added", s => renderComment(s.key, s.val()));
</script>

</body>
</html>
