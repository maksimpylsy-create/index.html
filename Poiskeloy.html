<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Page</title>
    <style>
        body {
            margin: 0;
            padding-top: 15px;
            text-align: center;
            font-family: Arial, sans-serif;
            background-image: url(TropicalPic1.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo {
            max-width: 750px; /* Adjust as needed */
            height: auto; /* Maintain aspect ratio */
        }

        .search-container {
            display: flex;
            justify-content: center;
        }

        .search-box {
            width: 500px;
            max-width: 90%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 30px;
            border: 1px solid #dcdcdc;
            outline: none;
        }

        .search-box:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: transparent;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <img src="PoiskeloyLogo2.png" class="logo">
    </div>

    <div class="search-container">
        <input type="text" placeholder="Search..." class="search-box">
    </div>
    wienie
</body>
</html>
